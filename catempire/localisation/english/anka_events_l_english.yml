l_english:
 owlia_hungar.1.b:0 "We have no choice, we must surrender"
 owlia_hungar.1.a:0 "We will stand our Ground!"
 owliar_titar:0 "Owlian Ultimatum"
 owlia_desc:0 "Following a period of research and genealogy, the Feudal Eagleist claim on the territories of Wesowl, Now called Tiszântul, has now been pressed as a claim towards the Hungarian government, who allegedly had seized the region several hundreds of years ago during the Magyar Migrations.\n\nThe Army of Owlia has been mobilized by localization.OWL.leadername and has rapidly deployed to the border as the Hungarian Government has declined the "Ludicrous" demands levied by the Owlian state."
